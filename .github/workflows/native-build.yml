name: Native clean-clone build

on:
  pull_request:
  push:
    branches: [main]

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npm test

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - run: npm ci
      - run: npm run native:web-sync
      - name: Build Android debug APK without Cordova preparation
        run: ./platforms/android/gradlew -p platforms/android :app:assembleDebug

  ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run native:web-sync
      - name: Build iOS simulator app without Cordova preparation
        run: >-
          xcodebuild
          -workspace platforms/ios/App.xcworkspace
          -scheme App
          -configuration Debug
          -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          -derivedDataPath build/ci-ios
          CODE_SIGNING_ALLOWED=NO
          build
